{% extends "base.html" %}

{% block title %}Регистрация{% endblock %}

{% block content %}
    <div class="login">
<h1>Регистрация</h1>

<form method="post" class="login" action="/auth/register" id="register-form">
    <div class="form-group">
        <label for="username">Имя пользователя</label>
        <input type="text" id="username" name="username" required>
        <div id="username-error"  style="color: red; z-index:10 ;display: block; font-size: 0.9em; margin-top: 5px;">Никнейм занят</div>
    </div>
    <div class="form-group">
        <label for="password">Пароль</label>
        <input type="password" id="password" name="password" autocomplete="new-password" required>
    </div>
    <div class="form-group">
        <label for="confirm_password">Подтверждение пароля</label>
        <input type="password" id="confirm_password" name="confirm_password" autocomplete="off" required>
        <div id="password-error" style="color: red; display: none; font-size: 0.9em; margin-top: 5px;">Пароли не совпадают</div>
    </div>
    <button type="submit" id="submit-btn" disabled>Зарегистрироваться</button>
</form>


<script>
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const confirmInput = document.getElementById('confirm_password');
    const usernameError = document.getElementById('username-error');
    const passwordError = document.getElementById('password-error');
    const submitBtn = document.getElementById('submit-btn');

    let usernameAvailable = false;
    let passwordsMatch = false;


    function checkPasswordsMatch() {
        const password = passwordInput.value;
        const confirm = confirmInput.value;

        if (confirm.length === 0) {
            passwordError.style.display = 'none';
            passwordsMatch = false;
            return false;
        }
        if (password !== confirm) {
            passwordError.style.display = 'block';
            passwordsMatch = false;
            return false;
        } else {
            passwordError.style.display = 'none';
            passwordsMatch = true;
            return true;
        }
    }

    
    function checkUsernameAvailability() {
        const username = usernameInput.value.trim();
        if (username.length === 0) {
            usernameError.style.display = 'none';
            usernameAvailable = false;
            updateSubmitButton();
            return;
        }

        fetch(`/auth/check-username?username=${encodeURIComponent(username)}`)
            .then(response => response.json())
            .then(data => {
                usernameAvailable = data.available;
                usernameError.style.display = usernameAvailable ? 'none' : 'block';
                updateSubmitButton();
            })
            .catch(err => {
                console.error('Ошибка проверки username:', err);
            
                usernameAvailable = true;
                usernameError.style.display = 'none';
                updateSubmitButton();
            });
    }

    
    function updateSubmitButton() {
        
        const usernameFilled = usernameInput.value.trim() !== '';
        const passwordFilled = passwordInput.value !== '';
        const confirmFilled = confirmInput.value !== '';

        if (usernameAvailable && passwordsMatch && usernameFilled && passwordFilled && confirmFilled) {
            submitBtn.disabled = false;
        } else {
            submitBtn.disabled = true;
        }
    }

    
    usernameInput.addEventListener('input', checkUsernameAvailability);
    passwordInput.addEventListener('input', () => {
        checkPasswordsMatch();
        updateSubmitButton();
    });
    confirmInput.addEventListener('input', () => {
        checkPasswordsMatch();
        updateSubmitButton();
    });

   
    checkUsernameAvailability();
    checkPasswordsMatch();

    
    document.getElementById('register-form').addEventListener('submit', function(e) {
        if (!usernameAvailable || !passwordsMatch) {
            e.preventDefault();
            if (!usernameAvailable) usernameError.style.display = 'block';
            if (!passwordsMatch) passwordError.style.display = 'block';
        }
    });
</script>

<p>Уже есть аккаунт? <a href="/auth/login">Войти</a></p>
     </div>
{% endblock %}
